[package]
name        = "mia"
description = "FerroGate — Machine Identity Agent (host daemon)"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true

[lib]
name = "mia"
path = "src/lib.rs"

[[bin]]
name = "mia"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
ferro-crypto = { path = "../ferro-crypto" }
ferro-attest = { path = "../ferro-attest" }
ferro-audit  = { path = "../ferro-audit" }
ferro-proto  = { path = "../ferro-proto" }

tokio              = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow             = { workspace = true }

# The TPM 2.0 ESAPI stack only builds where a TSS2 implementation exists
# (Linux `/dev/tpmrm0`, Windows TBS). On other hosts `mia::tpm` compiles out.
[target.'cfg(target_os = "linux")'.dependencies]
tss-esapi = { workspace = true }

[target.'cfg(target_os = "linux")'.dev-dependencies]
hex          = { workspace = true }
sha2         = { workspace = true }
rcgen        = { workspace = true }
tss-esapi    = { workspace = true }
ferro-attest = { path = "../ferro-attest" }
