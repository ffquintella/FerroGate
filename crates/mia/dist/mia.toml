# FerroGate Machine Identity Agent (MIA) — configuration file (TOML).
#
# This is an OPTIONAL structured alternative to the environment-file template
# (mia.env). MIA discovers it at `--config <path>`, then $FERROGATE_CONFIG, then
# the OS system path, then the per-user path:
#
#   Linux    /etc/ferrogate/mia.toml                       ~/.config/ferrogate/mia.toml
#   macOS    /Library/Application Support/FerroGate/...     ~/Library/Application Support/FerroGate/...
#   Windows  %ProgramData%\FerroGate\mia.toml               %APPDATA%\FerroGate\mia.toml
#
# Precedence is
#
#     built-in defaults  <  this file  <  environment variables
#
# so an explicitly-set FERROGATE_* / RUST_LOG variable always overrides the
# value here. Every key below is optional; omit a key to take its default.
# Generate or edit this file interactively with `mia setup`.

# Tracing verbosity (tracing EnvFilter syntax). Overridden by $RUST_LOG.
# Default: "info".
#log = "info"

# --- CMIS server ------------------------------------------------------------
# The Central Machine Identity Service this agent attests to. An https:// URL
# is dialed over hybrid-PQC TLS and pinned by SPKI; http:// is plaintext
# bring-up only.
[cmis]
#endpoint = "https://cmis.example.com:8443"
# High availability: instead of a single `endpoint`, point at a DNS SRV record
# advertising the CMIS nodes. The agent resolves it, prefers records by RFC 2782
# priority/weight, dials the best live node over hybrid-PQC TLS, and fails over
# to the next one automatically (re-resolving so a rescaled cluster is followed).
# Mutually exclusive with `endpoint`; the pin below authenticates every node.
#srv = "_cmis._tcp.example.com"
# Accepted CMIS SPKI pin (lowercase-hex SHA-384). Required with endpoint or srv.
#spki_pin = "<hex-sha384>"

# --- Helper API (feature F08) -----------------------------------------------
# The local helper listener: a Unix socket path (Linux/macOS) or a named-pipe
# name (Windows, e.g. \\.\pipe\ferrogate-mia). Setting `socket` ENABLES the
# helper API; with none configured the daemon logs a banner and exits.
[helper]
#socket = "/run/ferrogate/mia.sock"
# Unix only. Octal socket mode (as a string). Default: "660".
#socket_mode = "660"
# Unix only. Numeric gid that owns the socket; members of that group may open
# it (with the default 0660 mode). `make mia-install` creates a dedicated
# FerroGate group and sets this via FERROGATE_HELPER_SOCKET_GID, so you don't
# normally set it here. A group *name* is not accepted (the daemon is
# unsafe-free and won't call getgrnam); use the numeric gid.
#socket_gid = "555"
# Windows only. Local group whose members may open the pipe (blank => default
# pipe DACL).
#windows_group = "FerroGateClients"

# --- Allowlist --------------------------------------------------------------
# Signed CBOR allowlist of vetted local callers. With no `path`, the helper API
# denies every caller (fail closed). `key` is required whenever `path` is set.
[allowlist]
#path = "/etc/ferrogate/allowlist.cbor"
#key = "/etc/ferrogate/allowlist.pub"
# Maximum accepted allowlist age in seconds. Default: 86400.
#max_age_secs = 86400
# Fetch this host's signed allowlist from CMIS at startup (the GetAllowlist RPC,
# keyed by the host's EK-derived UUID) and write it to `path` before loading, so
# the on-disk artefact stays in sync with what the operator provisioned. Needs
# cmis.endpoint + cmis.spki_pin and a successful attestation; a fetch failure is
# non-fatal and falls back to whatever is already at `path`. Default: false.
#fetch = false
# Propose the local callers this host observes (granted and denied) to CMIS
# periodically. CMIS auto-adopts the first proposal on a host with no allowlist
# (bootstrap/TOFU) or queues it for operator review, per its policy. Needs
# cmis.endpoint + cmis.spki_pin and a host SVID. Default: false.
#propose = false
# How often (seconds) to propose when `propose` is set. Default: 300.
#propose_interval_secs = 300

# --- Attestation ------------------------------------------------------------
[attestation]
# Override the IMA runtime-measurement log path.
#ima_log = "/sys/kernel/security/integrity/ima/ascii_runtime_measurements"
