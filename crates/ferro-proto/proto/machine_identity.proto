// FerroGate MachineIdentity gRPC surface (feature F04).
//
// All RPCs run over a hybrid post-quantum TLS 1.3 channel (feature F01).
// `Attest` is the only RPC a client may call without an existing valid SVID;
// the client authenticates anonymously at the TLS layer and proves its
// hardware identity in-band via the four-phase protocol (docs/protocol.md).

syntax = "proto3";

package ferrogate.v1;

service MachineIdentity {
  // Four-phase streaming attestation handshake. The server speaks first with
  // a Nonce, then drives challenge/response and finally returns the SVID.
  rpc Attest (stream AttestRequest) returns (stream AttestResponse);

  // Fetch the most recently issued SVID for a SPIFFE id (debug / cache miss).
  rpc FetchSVID (FetchRequest) returns (SVIDBundle);

  // In-window renewal. No TPM interaction when PCRs and policy epoch are
  // unchanged and the SVID is inside its re-attestation window; otherwise the
  // server refuses and the client must run a full Attest.
  rpc Rotate (RotateRequest) returns (SVIDBundle);

  // Composite verification key set used to validate SVID signatures. Also
  // carries the composite-signed CRL in the `x-ferrogate-crl` extension member
  // (feature F11).
  rpc JWKS (JWKSRequest) returns (JWKSResponse);

  // Returns the CMIS enrollment public key — the composite public key (raw
  // `classical || pqc` concat bytes) that signs caller allowlists. A host
  // agent writes this to its `allowlist.key` so it can verify the signed
  // allowlist it later loads. Unauthenticated: this is public key material.
  rpc GetEnrollmentKey (GetEnrollmentKeyRequest) returns (GetEnrollmentKeyResponse);

  // ---- Caller allowlists ----

  // Fetch the signed caller allowlist for a host, keyed by its EK-derived host
  // UUID (`ferro_svid::host_uuid_from_ek_digest`). Returns the CBOR
  // `SignedAllowlist` bytes, or empty when none is stored. Unauthenticated: the
  // body is integrity-protected by its signature and is not secret, and a host
  // can be provisioned before it has attested (no SPIFFE id required).
  rpc GetAllowlist (GetAllowlistRequest) returns (GetAllowlistResponse);

  // Admin RPC: store or replace the caller allowlist for a host. CMIS stamps
  // the issuer trust domain and the validity window, signs the supplied entries
  // with the enrollment key (context `ferrogate-allowlist-v1`), and persists the
  // signed body. Authenticated out of band as an operator action.
  rpc SetAllowlist (SetAllowlistRequest) returns (SetAllowlistResponse);

  // Admin RPC: delete a host's stored allowlist. Authenticated out of band as an
  // operator action.
  rpc DeleteAllowlist (DeleteAllowlistRequest) returns (DeleteAllowlistResponse);

  // Admin RPC: enumerate the host UUIDs that have a stored allowlist, with
  // validity and entry-count metadata. Authenticated out of band as an operator
  // action.
  rpc ListAllowlists (ListAllowlistsRequest) returns (ListAllowlistsResponse);

  // ---- Allowlist proposals (host-driven TOFU) ----

  // Host-authenticated RPC: a host agent (mia) proposes the set of local
  // callers it has observed. The proposal is CBOR `ferro_svid::ProposalDoc`
  // signed by the host's machine key (context `ferrogate-allowlist-proposal-v1`)
  // and accompanied by the host's SVID JWS; CMIS verifies the SVID it issued,
  // checks the signature against the key bound by the SVID's `cnf.jkt`, and
  // confirms the proposal's host_uuid matches the SVID. With no allowlist yet
  // for the host and policy permitting, CMIS signs and stores it immediately
  // (first-use bootstrap, TOFU); otherwise it queues the proposal for operator
  // review. Unlike the admin RPCs this is authenticated *in band* by the SVID.
  rpc ProposeAllowlist (ProposeAllowlistRequest) returns (ProposeAllowlistResponse);

  // Admin RPC: enumerate pending allowlist proposals awaiting operator review,
  // with their full proposed entries. Authenticated out of band as an operator
  // action.
  rpc ListProposals (ListProposalsRequest) returns (ListProposalsResponse);

  // Admin RPC: drop a host's pending proposal — used to reject it, and to clean
  // up after approving it (the operator approves via SetAllowlist). Authenticated
  // out of band as an operator action.
  rpc DeleteProposal (DeleteProposalRequest) returns (DeleteProposalResponse);

  // ---- Revocation (F11) ----

  // Admin RPC: revoke a single SVID by the lowercase-hex SHA-384 of its compact
  // JWS. The revocation appears in the next published CRL (CMIS publishes
  // immediately on revoke). Authenticated out of band as an operator action.
  rpc RevokeSvid (RevokeSvidRequest) returns (RevokeResponse);

  // Admin RPC: revoke every SVID and child token for a host SPIFFE ID.
  rpc RevokeHost (RevokeHostRequest) returns (RevokeResponse);

  // Admin RPC: bump the live RIM policy epoch (feature F10). Every host whose
  // last full attestation was under the previous epoch is forced through a
  // fresh four-phase Attest at its next Rotate. Records a PolicyEpochBumped
  // audit event. Authenticated out of band as an operator action.
  rpc BumpEpoch (BumpEpochRequest) returns (BumpEpochResponse);

  // ---- Operator inventory ----

  // Admin RPC: enumerate the issued SVIDs this node knows about — the local
  // store on a single replica, or the full clustered set on an HA deployment.
  // Returns a compact summary per SVID, including the `cert_sha` an operator
  // can feed straight into RevokeSvid. Authenticated out of band as an
  // operator action.
  rpc ListSvids (ListSvidsRequest) returns (ListSvidsResponse);

  // ---- Audit log (F07) ----

  // Latest Signed Tree Head. Verifiers re-anchor incremental consistency
  // proofs against this.
  rpc LatestSth (LatestSthRequest) returns (LatestSthResponse);

  // RFC 6962 inclusion proof for the leaf at `leaf_index` against the
  // current tree.
  rpc InclusionProof (InclusionProofRequest) returns (InclusionProofResponse);

  // RFC 6962 consistency proof from `old_size` to the current tree size.
  rpc ConsistencyProof (ConsistencyProofRequest) returns (ConsistencyProofResponse);

  // MIA-originated event forwarder. The body is canonical CBOR of a
  // `ferro_audit::AuditEvent`; CMIS appends it to its log and returns the
  // assigned leaf index.
  rpc AppendAuditEvent (AppendAuditRequest) returns (AppendAuditResponse);

  // ---- Cluster health (F05) ----

  // Coarse readiness probe for L4/L7 load balancers. Reports the local node's
  // Raft role and a single `healthy` boolean — an LB should treat `Unknown`
  // and `!healthy` alike as "not ready".
  rpc Health (HealthRequest) returns (HealthResponse);
}

// ---- Attest: client -> server ------------------------------------------

message AttestRequest {
  oneof phase {
    AttestInit init = 1;
    ChallengeResponse challenge_response = 2;
    Csr csr = 3;
  }
}

// Phase 2 — hardware and boot attestation evidence.
//
// A host presents exactly one profile. The TPM fields (1–6) carry an EK/AIK
// quote (feature F02). A TPM-less host (feature F15) leaves those empty and
// sets `host_key` instead; CMIS branches on its presence.
message AttestInit {
  bytes ek_cert = 1;                  // DER EK certificate
  repeated bytes ek_intermediates = 2; // DER intermediate CA certs
  bytes aik_pub = 3;                  // marshaled TPMT_PUBLIC
  bytes quote_blob = 4;               // marshaled TPMS_ATTEST
  bytes signature = 5;                // marshaled TPMT_SIGNATURE
  repeated PcrValue pcr_values = 6;   // raw PCR values for digest recompute

  // TPM-less host-key profile (F15). When set, fields 1–6 are ignored and the
  // handshake skips phase-3 credential activation.
  HostKeyEvidence host_key = 7;

  // The host's self-reported OS hostname, for operator display only (e.g. in
  // `list-svids` output). It is NOT identity — identity is the EK/fingerprint
  // — and is never verified; CMIS sanitises and truncates it before storing.
  string hostname = 8;
}

message PcrValue {
  uint32 index = 1;
  bytes value = 2;
}

// Stable, burned-in hardware identifiers a TPM-less host's identity is derived
// from. The verifier recomputes the fingerprint from these and confirms it
// matches `HostKeyEvidence.fingerprint`.
message MachineFacts {
  string board_serial = 1;   // IOPlatformSerialNumber / DMI board serial
  string platform_uuid = 2;  // IOPlatformUUID / DMI product_uuid
  string disk_serial = 3;    // boot-disk hardware serial
}

// Phase 2 evidence for the TPM-less host-key profile (F15). The signing key is
// an ECDSA P-256 key held in the host's Secure Enclave (macOS) or a protected
// file (other platforms); `sep_pub` is its DER SubjectPublicKeyInfo.
message HostKeyEvidence {
  bytes fingerprint = 1;     // SHA-384 hardware fingerprint H (48 bytes)
  MachineFacts facts = 2;    // raw identifiers, so the server can recompute H
  bytes sep_pub = 3;         // DER SPKI of the machine key (≈ aik_pub)
  bytes signature = 4;       // X9.62 DER ECDSA-P256 over (nonce ‖ H)
}

// Phase 3 — the secret released by TPM2_ActivateCredential.
message ChallengeResponse {
  bytes secret = 1;
}

// Phase 4 — hardware-bound composite CSR.
message Csr {
  bytes composite_pub = 1; // concat composite public key (1984 bytes)
  string dpop_jkt = 2;     // DPoP key thumbprint, base64url
  // Hardware signature binding the composite key to the host's hardware key.
  // TPM profile: AIK signature over SHA-384(composite_pub). Host-key profile
  // (F15): X9.62 DER ECDSA-P256 signature over composite_pub by the SEP key.
  bytes aik_sig = 3;
}

// ---- Attest: server -> client ------------------------------------------

message AttestResponse {
  oneof phase {
    Nonce nonce = 1;
    Challenge challenge = 2;
    SVIDBundle svid = 3;
  }
}

// Phase 2 — server-supplied qualifyingData for the quote.
message Nonce {
  bytes nonce = 1;
}

// Phase 3 — credential-activation challenge (MakeCredential output).
message Challenge {
  bytes credential_blob = 1;
  bytes secret_blob = 2;
}

// ---- Shared issuance result --------------------------------------------

message SVIDBundle {
  string jws = 1;          // compact JWS SVID
  int64 issued_at = 2;     // unix seconds (iat)
  int64 expires_at = 3;    // unix seconds (exp)
  string spiffe_id = 4;    // sub claim, for convenience
}

// ---- Rotate / Fetch / JWKS ---------------------------------------------

message FetchRequest {
  string spiffe_id = 1;
}

message RotateRequest {
  string current_svid = 1;            // the JWS to renew
  repeated PcrValue pcr_values = 2;   // current PCRs, for drift detection
  uint64 known_epoch = 3;             // policy epoch the client believes is live
}

message JWKSRequest {}

message JWKSResponse {
  string jwks_json = 1;
}

message GetEnrollmentKeyRequest {}

message GetEnrollmentKeyResponse {
  // The CMIS enrollment public key as composite concat bytes
  // (ed25519 || ml-dsa-65), i.e. `CompositePublicKey::from_concat_bytes`.
  bytes public_key = 1;
}

// ---- Caller allowlists -------------------------------------------------

// One permitted caller: the lowercase-hex SHA-384 of its binary, optionally
// pinned to a uid. An absent `uid` permits the binary run by any user (the
// restart-stable mode for ephemeral-uid callers); see ADR-0002. Mirrors
// `ferro_svid::allowlist::AllowEntry`.
message AllowEntryMsg {
  optional uint32 uid = 1; // absent ⇒ any user (wildcard)
  string bin_sha = 2; // lowercase hex SHA-384 (96 chars)
}

message GetAllowlistRequest {
  string host_uuid = 1; // EK-derived host UUID
}

message GetAllowlistResponse {
  // CBOR `SignedAllowlist` bytes, or empty when no allowlist is stored.
  bytes signed_allowlist = 1;
}

message SetAllowlistRequest {
  string host_uuid = 1;              // EK-derived host UUID
  repeated AllowEntryMsg entries = 2; // permitted callers
  int64 ttl_secs = 3;                // validity window; CMIS stamps issued_at/not_after
}

message SetAllowlistResponse {
  int64 issued_at = 1; // unix seconds CMIS stamped
  int64 not_after = 2; // unix seconds CMIS stamped
}

message DeleteAllowlistRequest {
  string host_uuid = 1;
}

message DeleteAllowlistResponse {
  bool existed = 1; // whether a stored allowlist was removed
}

message ListAllowlistsRequest {}

// Compact view of one stored allowlist — never re-derives membership, just
// enough for an operator to see what is provisioned.
message AllowlistSummary {
  string host_uuid = 1;
  int64 issued_at = 2;
  int64 not_after = 3;
  uint32 entry_count = 4;
}

message ListAllowlistsResponse {
  repeated AllowlistSummary items = 1;
}

// ---- Allowlist proposals -----------------------------------------------

message ProposeAllowlistRequest {
  // Canonical CBOR of `ferro_svid::allowlist::ProposalDoc`
  // (`{host_uuid, issued_at, entries}`). Carried as opaque bytes so the exact
  // bytes the host signed are what CMIS verifies.
  bytes signed_proposal = 1;
  // Host machine-key signature over `proposal_signing_input(signed_proposal)`
  // (context `ferrogate-allowlist-proposal-v1` followed by the CBOR). X9.62 DER
  // ECDSA-P256 over SHA-256, by the host's machine (SEP) key.
  bytes proposal_sig = 2;
  // The host's compact-JWS SVID, proving which attested host is proposing. CMIS
  // re-verifies it was issued by this CMIS and reads `sub` + `cnf.jkt` from it.
  string svid_jws = 3;
  // DER SubjectPublicKeyInfo of the host machine key that produced
  // `proposal_sig`. CMIS confirms `base64url(SHA256(sep_pub)) == svid.cnf.jkt`
  // before trusting the signature, binding the proposal to the SVID's key.
  bytes sep_pub = 4;
}

message ProposeAllowlistResponse {
  enum Outcome {
    // Queued for operator review (an allowlist already exists, or policy
    // declines to auto-adopt).
    PENDING = 0;
    // Signed and stored immediately (first-use bootstrap under policy).
    AUTO_ADOPTED = 1;
    // The proposed entries already match the live allowlist; nothing changed.
    UNCHANGED = 2;
  }
  Outcome outcome = 1;
  int64 issued_at = 2; // unix seconds CMIS stamped (set when AUTO_ADOPTED)
  int64 not_after = 3; // unix seconds CMIS stamped (set when AUTO_ADOPTED)
}

message ListProposalsRequest {}

// One pending proposal awaiting review, with its full proposed entries so an
// operator can diff it against the live allowlist before approving.
message PendingProposal {
  string host_uuid = 1;
  repeated AllowEntryMsg entries = 2;
  string proposer_spiffe_id = 3; // SVID `sub` that submitted the proposal
  int64 proposed_at = 4;         // unix seconds CMIS recorded it
}

message ListProposalsResponse {
  repeated PendingProposal items = 1;
}

message DeleteProposalRequest {
  string host_uuid = 1;
}

message DeleteProposalResponse {
  bool existed = 1; // whether a pending proposal was removed
}

// ---- Revocation (F11) --------------------------------------------------

message RevokeSvidRequest {
  string cert_sha = 1; // lowercase hex SHA-384 of the compact JWS (96 chars)
  string reason = 2;   // stable operator opcode, e.g. "key-compromise"
}

message RevokeHostRequest {
  string spiffe_id = 1; // host SPIFFE id to revoke
  string reason = 2;    // stable operator opcode
}

message RevokeResponse {
  uint64 crl_number = 1; // sequence number of the CRL carrying the revocation
}

// ---- Policy epoch (F10) ------------------------------------------------

message BumpEpochRequest {
  string reason = 1; // stable operator opcode, e.g. "rim-policy-change"
}

message BumpEpochResponse {
  uint64 new_epoch = 1; // the epoch now in force after the bump
}

// ---- SVID inventory (operator CLI) -------------------------------------

message ListSvidsRequest {}

// Compact view of one issued SVID — never the private material, just enough
// for an operator to identify a host and act on it.
message SvidSummary {
  string spiffe_id = 1;    // subject SPIFFE id
  string cert_sha = 2;     // lowercase hex SHA-384 of the compact JWS (RevokeSvid key)
  int64 issued_at = 3;     // unix seconds (iat) of the current bundle
  int64 expires_at = 4;    // unix seconds (exp) of the current bundle
  string policy_id = 5;    // RIM policy generation at the last full attestation
  uint64 policy_epoch = 6; // RIM policy epoch at the last full attestation
  string hostname = 7;     // host's self-reported hostname — display only, not identity
}

message ListSvidsResponse {
  repeated SvidSummary svids = 1;
}

// ---- Audit log -----------------------------------------------------------

message SignedTreeHead {
  bytes body_cbor = 1;     // canonical CBOR of ferro_audit::SthBody
  string signer_kid = 2;
  bytes signature = 3;     // composite Ed25519+ML-DSA-65 concat
}

message LatestSthRequest {}
message LatestSthResponse { SignedTreeHead sth = 1; }

message InclusionProofRequest { uint64 leaf_index = 1; }
message InclusionProofResponse {
  bytes leaf_hash = 1;          // 48-byte SHA3-384
  uint64 leaf_index = 2;
  uint64 tree_size = 3;
  bytes root_hash = 4;          // 48-byte SHA3-384
  repeated bytes audit_path = 5;
}

message ConsistencyProofRequest { uint64 old_size = 1; }
message ConsistencyProofResponse {
  uint64 old_size = 1;
  uint64 new_size = 2;
  bytes new_root_hash = 3;
  repeated bytes audit_path = 4;
}

message AppendAuditRequest { bytes event_cbor = 1; }
message AppendAuditResponse { uint64 leaf_index = 1; }

// ---- Cluster health ------------------------------------------------------

// Coarse Raft role classification — matches `ferro_raft::NodeRole` but is
// pinned in the wire schema independently.
enum NodeRole {
  NODE_ROLE_UNKNOWN = 0;
  NODE_ROLE_LEADER = 1;
  NODE_ROLE_FOLLOWER = 2;
  NODE_ROLE_LEARNER = 3;
}

message HealthRequest {}
message HealthResponse {
  // True iff the local node believes it can serve. A non-clustered CMIS is
  // always healthy; a clustered CMIS is healthy iff hiqlite reports its local
  // node is up and synced.
  bool healthy = 1;
  // Raft role of the local node. `NODE_ROLE_UNKNOWN` for non-clustered nodes
  // or while the cluster is transitioning.
  NodeRole role = 2;
  // Local node id. `0` for non-clustered nodes.
  uint64 node_id = 3;
}
