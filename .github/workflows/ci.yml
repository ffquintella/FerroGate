name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets --locked
      # Doc-tests are not covered by --all-targets.
      - run: cargo test --workspace --doc --locked

  # Feature F12: no `unsafe` may appear under crates/mia. The crate already sets
  # `#![forbid(unsafe_code)]`, but this grep gate fails loudly even if that
  # attribute is ever dropped, and documents the invariant in CI. All hardening
  # FFI lives in ferro-harden (Linux) and ferro-winauth (Windows).
  no-unsafe-in-mia:
    name: forbid unsafe (mia)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep for unsafe constructs under crates/mia/src
        run: |
          # Match real unsafe items/blocks (`unsafe {`, `unsafe fn`, `unsafe impl`,
          # `unsafe trait`), not the word in prose like "`unsafe` is forbidden".
          if grep -rnE --include='*.rs' 'unsafe[[:space:]]*(\{|fn|impl|trait)' crates/mia/src; then
            echo "::error::found an unsafe construct under crates/mia/src — FFI must live in ferro-harden / ferro-winauth"
            exit 1
          fi
          echo "no unsafe constructs under crates/mia/src"

  # Feature F12: two independent release builds of the MIA must be byte-identical.
  reproducible-build:
    name: reproducible build (mia)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build prerequisites
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libtss2-dev
      - name: Two builds must be byte-identical
        run: bash scripts/reproducible-build.sh

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Enforce coverage baseline
        # Baseline kept intentionally low while crates are stubs (M0).
        # Raise as feature crates land — target: 85% for ferro-crypto /
        # ferro-attest / ferro-audit by end of M3.
        run: cargo llvm-cov report --fail-under-lines 10
      - name: Upload to artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
