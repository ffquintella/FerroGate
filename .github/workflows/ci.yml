name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets --locked
      # Doc-tests are not covered by --all-targets.
      - run: cargo test --workspace --doc --locked

  # Feature F12: no `unsafe` may appear under crates/mia. The crate already sets
  # `#![forbid(unsafe_code)]`, but this grep gate fails loudly even if that
  # attribute is ever dropped, and documents the invariant in CI. All hardening
  # FFI lives in ferro-harden (Linux) and ferro-winauth (Windows).
  no-unsafe-in-mia:
    name: forbid unsafe (mia)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep for unsafe constructs under crates/mia/src
        run: |
          # Match real unsafe items/blocks (`unsafe {`, `unsafe fn`, `unsafe impl`,
          # `unsafe trait`), not the word in prose like "`unsafe` is forbidden".
          if grep -rnE --include='*.rs' 'unsafe[[:space:]]*(\{|fn|impl|trait)' crates/mia/src; then
            echo "::error::found an unsafe construct under crates/mia/src — FFI must live in ferro-harden / ferro-winauth"
            exit 1
          fi
          echo "no unsafe constructs under crates/mia/src"

  # Feature F12: two independent release builds of the MIA must be byte-identical.
  reproducible-build:
    name: reproducible build (mia)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build prerequisites
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libtss2-dev
      - name: Two builds must be byte-identical
        run: bash scripts/reproducible-build.sh

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # Milestone M6: machine-check the two protocol models within a time budget.
  # The job FAILS if any Tamarin lemma is falsified or any CryptoVerif query is
  # not proved. The per-proof timeout is the budget; exceeding it fails loudly
  # (a protocol change that blows the budget needs a re-examined proof, not a
  # bumped limit). See formal/README.md.
  formal-verification:
    name: formal verification (tamarin + cryptoverif)
    runs-on: ubuntu-latest
    env:
      FERROGATE_FORMAL_TIMEOUT: 600
    steps:
      - uses: actions/checkout@v4

      - name: Install Maude (Tamarin backend)
        run: sudo apt-get update && sudo apt-get install -y maude graphviz

      - name: Install Tamarin prover
        run: |
          set -euo pipefail
          ver=1.10.0
          url="https://github.com/tamarin-prover/tamarin-prover/releases/download/${ver}/tamarin-prover-${ver}-linux64-ubuntu.tar.gz"
          curl -fsSL "$url" -o tamarin.tar.gz
          tar -xzf tamarin.tar.gz
          sudo install -m 0755 tamarin-prover /usr/local/bin/tamarin-prover
          tamarin-prover --version

      - name: Install CryptoVerif
        run: |
          set -euo pipefail
          sudo apt-get install -y ocaml ocaml-findlib
          ver=2.09
          curl -fsSL "https://cryptoverif.inria.fr/cryptoverif${ver}.tar.gz" -o cv.tar.gz
          mkdir -p cryptoverif && tar -xzf cv.tar.gz -C cryptoverif --strip-components=1
          ( cd cryptoverif && ./build )
          echo "CRYPTOVERIF_DIR=$PWD/cryptoverif" >> "$GITHUB_ENV"
          sudo ln -sf "$PWD/cryptoverif/cryptoverif" /usr/local/bin/cryptoverif

      - name: Tamarin — four-phase attestation
        run: |
          set -euo pipefail
          out=$(timeout "${FERROGATE_FORMAL_TIMEOUT}" \
            tamarin-prover --prove formal/tamarin/attestation.spthy 2>&1) || {
              echo "$out"; echo "::error::Tamarin run failed or timed out"; exit 1; }
          echo "$out"
          if echo "$out" | grep -qiE 'falsified|analysis incomplete'; then
            echo "::error::a Tamarin lemma was falsified or left incomplete"; exit 1
          fi
          echo "$out" | grep -qi 'verified' || {
            echo "::error::no Tamarin lemma reported verified"; exit 1; }

      - name: CryptoVerif — hybrid AKE
        run: |
          set -euo pipefail
          out=$(timeout "${FERROGATE_FORMAL_TIMEOUT}" \
            cryptoverif -lib "${CRYPTOVERIF_DIR}/default" \
            formal/cryptoverif/hybrid_ake.cv 2>&1) || {
              echo "$out"; echo "::error::CryptoVerif run failed or timed out"; exit 1; }
          echo "$out"
          if echo "$out" | grep -qiE 'RESULT.*(cannot be proved|not proved)'; then
            echo "::error::a CryptoVerif query could not be proved"; exit 1
          fi
          echo "$out" | grep -qiE 'RESULT.*proved|All queries proved' || {
            echo "::error::CryptoVerif did not report the query proved"; exit 1; }

  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Enforce coverage baseline
        # Baseline kept intentionally low while crates are stubs (M0).
        # Raise as feature crates land — target: 85% for ferro-crypto /
        # ferro-attest / ferro-audit by end of M3.
        run: cargo llvm-cov report --fail-under-lines 10
      - name: Upload to artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
