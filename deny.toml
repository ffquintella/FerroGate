# cargo-deny configuration for FerroGate.
# See https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[advisories]
version  = 2
ignore   = []

[licenses]
version       = 2
confidence-threshold = 0.92
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "MPL-2.0",
]

[[licenses.exceptions]]
allow = ["OpenSSL"]
name  = "ring"

[bans]
multiple-versions = "warn"
wildcards         = "deny"
deny = [
    # Force the project to rely on `ring` / `aws-lc-rs` rather than `openssl`
    # bindings, in line with the design docs.
    { name = "openssl-sys" },
    { name = "openssl" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
